<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Bouquet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap');

:root {
  --tulip-main: #e8265e;
  --tulip-light: #f76fa0;
  --lily-main: #4a90d9;
  --lily-light: #7bb8f0;
  --lily-dark: #2860a8;
  --stem: #3d8c1a;
  --stem-light: #5ab82e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(180deg, #87ceeb 0%, #b0e0f7 40%, #d4f0ff 70%, #e8f8ff 100%);
  min-height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
  font-family: 'Cormorant Garamond', Georgia, serif;
}

.rays { position:fixed; top:-10%; left:50%; transform:translateX(-50%); width:900px; height:700px; pointer-events:none; z-index:0; }
.ray { position:absolute; top:0; left:50%; width:2px; height:100%; transform-origin:top center; background:linear-gradient(to bottom,rgba(255,255,255,0.18),transparent); border-radius:1px; }

.cloud { position:fixed; background:white; border-radius:50px; opacity:0.75; pointer-events:none; z-index:1; animation:cloudDrift linear infinite; }
.cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
@keyframes cloudDrift { from{transform:translateX(-250px);} to{transform:translateX(calc(100vw + 250px));} }

.dew { position:fixed; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,0.9),rgba(200,230,255,0.3)); pointer-events:none; animation:dewFloat linear infinite; z-index:1; }
@keyframes dewFloat { 0%{transform:translateY(0) scale(1);opacity:0;} 15%{opacity:1;} 85%{opacity:0.6;} 100%{transform:translateY(-180px) scale(0.3);opacity:0;} }

.scene { position:relative; width:100vw; height:100vh; display:flex; align-items:flex-end; justify-content:center; z-index:2; }

.ground { position:absolute; bottom:0; left:0; right:0; height:200px; background:linear-gradient(180deg,#4a8a22 0%,#3a6b1a 20%,#2a5010 50%,#1a3508 100%); border-radius:55% 55% 0 0 / 40px 40px 0 0; overflow:hidden; }
.ground::before { content:''; position:absolute; top:-30px; left:-5%; width:110%; height:80px; background:radial-gradient(ellipse 20% 100% at 15% 100%,#5aad2e 0%,transparent 100%), radial-gradient(ellipse 18% 100% at 35% 100%,#4a9a22 0%,transparent 100%), radial-gradient(ellipse 22% 100% at 55% 100%,#5aad2e 0%,transparent 100%), radial-gradient(ellipse 16% 100% at 72% 100%,#4a9a22 0%,transparent 100%), radial-gradient(ellipse 20% 100% at 88% 100%,#5aad2e 0%,transparent 100%); }
.grass-strip { position:absolute; top:-22px; left:0; right:0; display:flex; justify-content:center; align-items:flex-end; gap:1px; height:28px; overflow:hidden; }
.blade { width:3px; background:linear-gradient(to top,#3a6b1a,#6dc936); border-radius:2px 2px 0 0; transform-origin:bottom; animation:bladeSway ease-in-out infinite alternate; }
@keyframes bladeSway { from{transform:rotate(-5deg) scaleY(0.9);} to{transform:rotate(5deg) scaleY(1.05);} }

.bouquet { position:absolute; bottom:140px; left:50%; transform:translateX(-50%); width:520px; height:620px; }
.plant { position:absolute; bottom:0; display:flex; flex-direction:column; align-items:center; transform-origin:bottom center; opacity:0; }

@keyframes growUp { from{opacity:0;transform:scaleY(0) translateY(20px);} to{opacity:1;transform:scaleY(1) translateY(0);} }
@keyframes swayL  { 0%,100%{transform:rotate(-2.5deg);} 50%{transform:rotate(3deg);} }
@keyframes swayR  { 0%,100%{transform:rotate(2.5deg);}  50%{transform:rotate(-3deg);} }

.tulip  { animation: growUp 1.4s 0.2s cubic-bezier(0.34,1.46,0.64,1) forwards, swayL 3.2s 1.6s ease-in-out infinite; left:calc(50% - 40px); z-index:10; }
.lily-1 { animation: growUp 1.4s 0.8s cubic-bezier(0.34,1.46,0.64,1) forwards, swayR 3.4s 2.2s ease-in-out infinite; left:calc(50% - 110px); z-index:8; }
.lily-2 { animation: growUp 1.4s 1.1s cubic-bezier(0.34,1.46,0.64,1) forwards, swayL 2.9s 2.5s ease-in-out infinite; left:calc(50% + 20px); z-index:8; }
.lily-3 { animation: growUp 1.4s 1.4s cubic-bezier(0.34,1.46,0.64,1) forwards, swayR 3.2s 2.8s ease-in-out infinite; left:calc(50% - 60px); z-index:7; }

.stem { width:5px; background:linear-gradient(to top,var(--stem),var(--stem-light)); border-radius:3px; position:relative; }
.sl { position:absolute; width:28px; height:12px; background:linear-gradient(135deg,#5ab82e,#2e7a1c); border-radius:50% 0 50% 0; }
.sl-l { left:-23px; transform:rotate(-30deg); top:35%; }
.sl-r { right:-23px; transform:rotate(30deg) scaleX(-1); top:60%; }

/* TULIP */
.tulip-stem { height:340px; }
.tulip-head { position:relative; width:72px; height:94px; margin-bottom:-3px; }
.tp { position:absolute; bottom:0; border-radius:50% 50% 20% 20% / 65% 65% 20% 20%; transform-origin:bottom center; }
.tp-l  { width:40px; height:74px; left:2px;  background:linear-gradient(160deg,var(--tulip-light),var(--tulip-main)); transform:rotate(-22deg); }
.tp-il { width:34px; height:62px; left:9px;  background:linear-gradient(170deg,#ffc0d8,var(--tulip-main)); transform:rotate(-10deg); z-index:1; opacity:.85; }
.tp-c  { width:46px; height:92px; left:13px; background:linear-gradient(180deg,#ff9fc5,var(--tulip-main)); z-index:2; }
.tp-ir { width:34px; height:62px; right:9px; background:linear-gradient(190deg,#ffc0d8,var(--tulip-main)); transform:rotate(10deg); z-index:1; opacity:.85; }
.tp-r  { width:40px; height:74px; right:2px; background:linear-gradient(200deg,var(--tulip-light),#c2185b); transform:rotate(22deg); }
.big-leaf { position:absolute; width:50px; height:22px; background:linear-gradient(135deg,#6dc936,#2e7a1c); border-radius:50% 0 50% 0; }
.bl-l { left:-44px; transform:rotate(-28deg); top:38%; }
.bl-r { right:-44px; transform:rotate(28deg) scaleX(-1); top:38%; }

/* LILY */
.lily-stem { height:220px; }
.lily-head { display:block; margin-bottom:-6px; line-height:0; }
.lily-head svg { display:block; overflow:visible; }
.lbl { position:absolute; width:30px; height:13px; background:linear-gradient(135deg,#5ab82e,#2e7a1c); border-radius:50% 0 50% 0; }
.lbl-l { left:-24px; top:35%; transform:rotate(-32deg); }
.lbl-r { right:-24px; top:58%; transform:rotate(32deg) scaleX(-1); }

.title { position:fixed; top:32px; left:50px; transform:translateX(-50%); color:rgba(40,90,140,0.85); font-size:clamp(1rem,2.5vw,1.6rem); font-style:italic; letter-spacing:0.18em; white-space:nowrap; text-shadow:0 2px 12px rgba(255,255,255,0.7); z-index:20; animation:fadeInTitle 2s 3.5s both; }
@keyframes fadeInTitle { from{opacity:0;transform:translateX(-50%) translateY(-10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
</style>
</head>

<script>
  const raysEl = document.getElementById('rays');
  for (let i=0;i<18;i++){
    const r=document.createElement('div'); r.className='ray';
    r.style.transform=`rotate(${-40+i*5}deg)`;
    r.style.opacity=(0.04+Math.random()*0.05).toFixed(3);
    raysEl.appendChild(r);
  }
  const gs=document.getElementById('gs');
  const bc=Math.ceil(window.innerWidth/4);
  for(let i=0;i<bc;i++){
    const b=document.createElement('div'); b.className='blade';
    b.style.height=(10+Math.random()*18)+'px';
    b.style.animationDuration=(1.8+Math.random()*2)+'s';
    b.style.animationDelay=(Math.random()*2)+'s';
    b.style.opacity=0.6+Math.random()*0.4;
    gs.appendChild(b);
  }
  for(let i=0;i<20;i++){
    const d=document.createElement('div'); d.className='dew';
    const sz=2+Math.random()*5;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${20+Math.random()*60}%;bottom:${5+Math.random()*40}%;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*8}s`;
    document.body.appendChild(d);
  }

  const bouquet = document.querySelector('.bouquet');
  const bbPositions = [
    { x: -100, h: 110, delay: 1.8, z: 4, sway: 'swayR' },
    { x: -140, h:  90, delay: 2.1, z: 3, sway: 'swayL' },
    { x: -180, h: 100, delay: 2.4, z: 3, sway: 'swayR' },
    { x: -210, h:  80, delay: 2.7, z: 2, sway: 'swayL' },
    { x: -240, h:  95, delay: 3.0, z: 2, sway: 'swayR' },
    { x:  -75, h: 125, delay: 2.0, z: 5, sway: 'swayL' },
    { x: -160, h:  85, delay: 2.3, z: 3, sway: 'swayR' },
    { x:   10, h: 115, delay: 1.9, z: 5, sway: 'swayR' },
    { x:   50, h:  95, delay: 2.2, z: 4, sway: 'swayL' },
    { x:   90, h: 105, delay: 2.5, z: 3, sway: 'swayR' },
    { x:  125, h:  85, delay: 2.8, z: 2, sway: 'swayL' },
    { x:  160, h:  90, delay: 3.1, z: 2, sway: 'swayR' },
    { x:  -10, h: 130, delay: 2.1, z: 6, sway: 'swayL' },
    { x:   70, h:  88, delay: 2.6, z: 3, sway: 'swayR' },
    { x:  -58, h: 140, delay: 1.6, z: 6, sway: 'swayR' },
    { x:  -25, h: 135, delay: 1.7, z: 6, sway: 'swayL' },
    { x: -120, h:  98, delay: 2.2, z: 4, sway: 'swayL' },
    { x:   35, h: 102, delay: 2.3, z: 4, sway: 'swayR' },
    { x: -270, h:  75, delay: 3.3, z: 1, sway: 'swayL' },
    { x:  185, h:  78, delay: 3.4, z: 1, sway: 'swayR' },
  ];

  bbPositions.forEach((p, i) => {
    const headAngles  = [-38, -13, 13, 38];
    const headLengths = [26, 32, 31, 25];
    const sid = `bb${i}`;
    let svg = `<svg width="80" height="55" viewBox="-40 -55 80 55" overflow="visible">
      <defs>
        <filter id="${sid}" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="1.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>`;
    headAngles.forEach((ang, idx) => {
      const len = headLengths[idx] + Math.random() * 6;
      const rad = ang * Math.PI / 180;
      const x2  = +(Math.sin(rad) * len).toFixed(1);
      const y2  = +(-Math.cos(rad) * len).toFixed(1);
      const midX = +(x2 * 0.55).toFixed(1);
      const midY = +(y2 * 0.55).toFixed(1);
      const subAng = rad + (idx % 2 === 0 ? 0.5 : -0.5);
      const sx = +(midX + Math.sin(subAng) * 10).toFixed(1);
      const sy = +(midY + (-Math.cos(subAng)) * 10).toFixed(1);
      svg += `
      <line x1="0" y1="0" x2="${x2}" y2="${y2}" stroke="#4db030" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="${x2}" cy="${y2}" r="3.5" fill="white" stroke="#c8e0c0" stroke-width="0.7" filter="url(#${sid})"/>
      <line x1="${midX}" y1="${midY}" x2="${sx}" y2="${sy}" stroke="#6dc936" stroke-width="0.8" stroke-linecap="round"/>
      <circle cx="${sx}" cy="${sy}" r="2.4" fill="white" stroke="#d8eed0" stroke-width="0.5" filter="url(#${sid})"/>`;
    });
    svg += `</svg>`;
    const el = document.createElement('div');
    el.className = 'plant';
    el.style.cssText = `left:calc(50% + ${p.x}px);z-index:${p.z};animation:growUp 1.2s ${p.delay}s cubic-bezier(0.34,1.46,0.64,1) forwards,${p.sway} ${2.5+Math.random()}s ${p.delay+1.2}s ease-in-out infinite;`;
    el.innerHTML = `<div style="margin-bottom:-2px;line-height:0">${svg}</div><div class="stem" style="height:${p.h}px;width:3px;"></div>`;
    bouquet.appendChild(el);
  });
</script>
</body>
</html>
